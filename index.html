

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Made for Bilal ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

font-family:Georgia,serif;

color:white;

text-align:center;

}

/* ==============================
   Containers
============================== */

.container{

width:100%;
padding:30px;

position:relative;

z-index:2;

}

.hidden{

display:none;

}

/* ==============================
   Titles
============================== */

h1{

font-size:52px;

color:#ff6b9d;

text-shadow:

0 0 10px #ff6b9d,

0 0 25px #ff6b9d,

0 0 45px #ff6b9d;

margin-bottom:20px;

}

h2{

font-size:28px;

font-weight:normal;

margin-top:15px;

}

/* ==============================
   Buttons
============================== */

button{

margin-top:35px;

padding:15px 35px;

font-size:18px;

background:transparent;

border:2px solid #ff6b9d;

border-radius:40px;

color:#ff6b9d;

cursor:pointer;

transition:.35s;

}

button:hover{

background:#ff6b9d;

color:black;

box-shadow:

0 0 20px #ff6b9d,

0 0 40px #ff6b9d;

transform:scale(1.06);

}

.buttonRow{

display:flex;

justify-content:center;

gap:20px;

}

/* ==============================
   Fade Animation
============================== */

.fade{

animation:fadeIn 2s forwards;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* ==============================
   Homepage Timings
============================== */

#ask{

opacity:0;

animation:fadeIn 2s forwards;

animation-delay:5s;

}

#again{

opacity:0;

animation:fadeIn 2s forwards;

animation-delay:7.5s;

}

#continueButton{

opacity:0;

animation:fadeIn 2s forwards;

animation-delay:9s;

}

/* ==============================
   CRT ERROR SCREEN
============================== */

#errorScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

background:#050505;

font-family:monospace;

z-index:999;

overflow:hidden;

}

/* Scan lines */

#errorScreen::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:

repeating-linear-gradient(

to bottom,

rgba(255,255,255,.05),

rgba(255,255,255,.05) 2px,

transparent 2px,

transparent 4px

);

pointer-events:none;

}

/* TV Flicker */

#errorScreen{

animation:flicker .12s infinite;

}

@keyframes flicker{

0%{opacity:1;}

50%{opacity:.92;}

100%{opacity:1;}

}

/* ERROR text */

#errorTitle{

font-size:90px;

color:#ff0000;

letter-spacing:12px;

text-shadow:

0 0 15px red,

0 0 35px red,

0 0 60px red;

margin-bottom:20px;

}

#errorText{

font-size:22px;

margin-bottom:40px;

}

#rebootText{

font-size:20px;

margin-bottom:18px;

}

/* ==============================
   Loading Bar
============================== */

#loadingBox{

width:430px;

height:30px;

border:2px solid white;

}

#loadingFill{

width:0%;

height:100%;

background:white;

transition:width 5s linear;

}

/* ==============================
   Screen Shake
============================== */

.shake{

animation:shake .18s infinite;

}

@keyframes shake{

0%{transform:translate(2px,2px);}
20%{transform:translate(-3px,-2px);}
40%{transform:translate(3px,-1px);}
60%{transform:translate(-2px,3px);}
80%{transform:translate(2px,-2px);}
100%{transform:translate(0px,0px);}

}

</style>

</head>

<body>

<div class="container">

    <!-- ================= HOME PAGE ================= -->

    <div id="home">

        <h1 class="fade">
            Made for Bilal ❤️
        </h1>

        <h2 id="ask">
            I need to ask u smt...
        </h2>

        <h2 id="again">
            (once again)
        </h2>

        <div id="continueButton">

            <button onclick="question()">
                Continue ❤️
            </button>

        </div>

    </div>


    <!-- ================= QUESTION PAGE ================= -->

    <div id="question" class="hidden">

        <h1>
            do you even love me?
        </h1>

        <div class="buttonRow">

            <button onclick="yes()">
                Yes ❤️
            </button>

            <button onclick="noAnswer()">
                No 💔
            </button>

        </div>

    </div>


    <!-- ================= THINK AGAIN PAGE ================= -->

    <div id="thinkAgain" class="hidden">

        <h1>
            Excuse me?? 
        </h1>

        <h2>
            think again
        </h2>

        <div class="buttonRow">

            <button onclick="yes()">
                Yes ❤️
            </button>

            <button onclick="yes()">
                Yes ❤️
            </button>

        </div>

    </div>

</div>


<!-- ================= TV ERROR SCREEN ================= -->

<div id="errorScreen">

    <h1 id="errorTitle">
        ERROR
    </h1>

    <p id="errorText">
        Wrong answer bruh
    </p>

    <p id="rebootText">
        System rebooting...
    </p>

    <div id="loadingBox">

        <div id="loadingFill">

        </div>

    </div>

</div>


<script>

function question(){

    document.getElementById("home").classList.add("hidden");

    const questionPage = document.getElementById("question");

    questionPage.classList.remove("hidden");

    questionPage.classList.add("fade");

}


function yes(){

    alert("💌 Next page coming soon... ❤️");

    // We'll replace this with your anniversary letter later.

}


function noAnswer(){

    document.body.classList.add("shake");

    const errorScreen = document.getElementById("errorScreen");

    const loadingFill = document.getElementById("loadingFill");

    errorScreen.style.display = "flex";

    loadingFill.style.transition = "none";
    loadingFill.style.width = "0%";

    void loadingFill.offsetWidth;

    loadingFill.style.transition = "width 5s linear";

    setTimeout(function(){

        loadingFill.style.width = "100%";

    },100);

    setTimeout(function(){

        errorScreen.style.display = "none";

        document.body.classList.remove("shake");

        document.getElementById("question").classList.add("hidden");

        const thinkAgain = document.getElementById("thinkAgain");

        thinkAgain.classList.remove("hidden");

        thinkAgain.classList.add("fade");

        loadingFill.style.transition = "none";

        loadingFill.style.width = "0%";

        void loadingFill.offsetWidth;

        loadingFill.style.transition = "width 5s linear";

    },5100);

}

</script>

</body>

</html>
