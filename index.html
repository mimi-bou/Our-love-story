<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Made for Bilal ❤️</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    text-align: center;
    overflow: hidden;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 42px;
    color: #ff6b9d;
    text-shadow: 0 0 20px #ff6b9d;
}

h2 {
    font-size: 30px;
    color: white;
}


button {

    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 15px 30px;
    margin: 15px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.4s;

}

button:hover {

    background: #ff6b9d;
    color: black;
    box-shadow: 0 0 25px #ff6b9d;
    transform: scale(1.08);

}


.fade {

    animation: fadeIn 2s forwards;

}


.hidden {

    display: none;

}


@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}


#explosion {

    position: fixed;
    font-size: 120px;
    display: none;

}


.shake {

    animation: shake 0.5s;

}


@keyframes shake {

    0% {transform: translate(5px,5px);}
    25% {transform: translate(-5px,-5px);}
    50% {transform: translate(5px,-5px);}
    75% {transform: translate(-5px,5px);}
    100% {transform: translate(0,0);}

}


</style>

</head>


<body>


<div class="container">


<div id="home">

<h1>Made for Bilal ❤️</h1>

<div class="fade">

<button onclick="question()">
I need to ask u smt.. (once again)
</button>

</div>

</div>



<div id="question" class="hidden">

<h1>do you even love me? </h1>

<button onclick="yes()">
Yes ❤️
</button>

<button onclick="no()">
No 💔
</button>

</div>




<div id="angry" class="hidden">

<h1>
Excuse me?? 
</h1>

<h2>
Wrong answer detected.
</h2>


<button onclick="yes()">
Yes ❤️
</button>


<button onclick="yes()">
Yes ❤️
</button>


</div>



</div>



<div id="explosion">
🔥💥🔥
</div>



<script>


function question(){

document.getElementById("home").style.display="none";

document.getElementById("question").style.display="block";

document.getElementById("question").classList.add("fade");

}



function no(){

document.body.classList.add("shake");

document.getElementById("explosion").style.display="block";


setTimeout(function(){

document.getElementById("explosion").style.display="none";

document.body.classList.remove("shake");


document.getElementById("question").style.display="none";

document.getElementById("angry").style.display="block";

document.getElementById("angry").classList.add("fade");


},1000);


}



function yes(){

alert("Good choice ❤️");

// Next page will go here later

}



</script>


</body>

</html>
