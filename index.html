<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Made for Bilal ❤️</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    font-family: Georgia, serif;
    text-align: center;
    overflow: hidden;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 40px;
    color: #ff6b9d;
    text-shadow: 0 0 15px #ff6b9d;
}

h2 {
    color: white;
    font-size: 28px;
}

button {
    background: #ff6b9d;
    color: white;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #ff6b9d;
}

.hidden {
    display: none;
}

#explosion {
    position: fixed;
    font-size: 100px;
    display: none;
}

</style>

</head>

<body>

<div class="container">

    <div id="firstPage">

        <h1>Made for Bilal ❤️</h1>

        <button onclick="question()">
            I need to ask you smt.. (once again)
        </button>

    </div>


    <div id="questionPage" class="hidden">

        <h1>Do you even love me? 🥺</h1>

        <button onclick="yes()">Yes ❤️</button>

        <button onclick="no()">No 💔</button>

    </div>


    <div id="finalChoice" class="hidden">

        <h1>Okay okay... answer properly 😤❤️</h1>

        <button onclick="yes()">Yes ❤️</button>

        <button onclick="yes()">Yes ❤️</button>

    </div>


</div>


<div id="explosion">
🔥💥🔥
</div>


<script>

function question(){

    document.getElementById("firstPage").style.display="none";
    document.getElementById("questionPage").style.display="block";

}


function yes(){

    alert("Awww ❤️");

    // We will connect this to the next page later

}


function no(){

    document.getElementById("explosion").style.display="block";

    setTimeout(function(){

        document.getElementById("explosion").style.display="none";

        document.getElementById("questionPage").style.display="none";

        document.getElementById("finalChoice").style.display="block";

    },1000);

}

</script>


</body>
</html>
